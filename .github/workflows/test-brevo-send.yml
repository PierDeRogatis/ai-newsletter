name: Test Brevo send (one-off)

on:
  workflow_dispatch:

jobs:
  test-send:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Send test email via Brevo
        env:
          BREVO_KEY: ${{ secrets.BREVO_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python3 scripts/test_brevo_send.py
